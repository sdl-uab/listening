<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Comprehension Exercise</title>
    <style>
        :root {
            --primary-color: #018539; 
            --dark-green: #015d28;   
            --error-color: #d32f2f;
            --success-bg: #e8f5e9;
            --error-bg: #ffebee;
            --option-hover-color: #f1f3f4;
            --text-color: #2c3e50;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
        }

        .header {
            position: relative;
            margin-bottom: 25px;
            text-align: center;
        }

        .header img {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 80px;
        }

        .header h2 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.75rem;
        }

        .header p {
            color: #666;
            margin: 10px 0 0 0;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary-color);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .audio-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--primary-color);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .play-btn:hover:not(.disabled) {
            background-color: var(--dark-green);
            transform: scale(1.05);
        }

        .play-btn.disabled {
            background-color: #ccc;
            cursor: default;
            box-shadow: none;
        }

        .play-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .question-text {
            font-size: 1.30rem;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
        }

        .options-list {
            list-style: none;
            padding: 0;
        }

        .option-item {
            margin-bottom: 12px;
        }

        .option-button {
            width: 100%;
            padding: 16px 20px;
            text-align: left;
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-button:not(.disabled):hover {
            border-color: #bdbdbd;
            background-color: var(--option-hover-color);
        }

        .option-button.correct {
            background-color: var(--success-bg) !important;
            border-color: var(--primary-color) !important;
            color: var(--primary-color);
            font-weight: 600;
        }

        .option-button.incorrect {
            background-color: var(--error-bg) !important;
            border-color: var(--error-color) !important;
            color: var(--error-color);
        }

        .option-button.disabled {
            cursor: default;
            pointer-events: none;
        }

        .navigation {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-height: 50px;
        }

        .next-btn {
            padding: 12px 40px;
            background-color: var(--dark-green);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            display: none;
        }

        .results-card {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .score-display {
            font-size: 6rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .restart-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
        }

        .feedback-icon {
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-ui">
        <div class="header">
            <div class="header-top">
                <img src="logo.png" alt="Logo">
                <h2>Comprensió oral</h2>
            </div>
            <p id="question-counter">Question 1 of 14</p>
        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="question-container">
        </div>

        <div class="navigation">
            <button id="next-button" class="next-btn" onclick="nextQuestion()">Next Question</button>
        </div>
    </div>

    <div id="results-ui" class="results-card">
        <h2>Exercise Completed</h2>
        <div class="score-display" id="final-score">0/14</div>
        <p id="score-message"></p>
        <div class="restart-container">
            <button class="next-btn" style="display:block;" onclick="location.reload()">Restart</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "Which is the correct answer?", options: ["Grimes", "Gravies", "Greaves", "Grieves"], correct: 2, audio: "audio1.mp3" },
        { q: "Which is the most appropriate response to what you hear?", options: ["In the local hospital", "I go by train", "I don't like walking", "I'm a doctor"], correct: 0, audio: "audio2.mp3" },
        { q: "Which is the most appropriate response to what you hear?", options: ["I don't like it much", "Well done, please", "It's delicious, thanks", "It's a little burnt"], correct: 1, audio: "audio3.mp3" },
        { q: "Which is the most appropriate response to what you hear?", options: ["I'm here on business", "It's my first visit here", "I'll be here for 5 days", "I was here last year"], correct: 0, audio: "audio4.mp3" },
        { q: "Which is the most appropriate response to what you hear?", options: ["Are you late?", "Are you sure?", "Where are you going?", "For what time?"], correct: 3, audio: "audio5.mp3" },
        { q: "What is the speaker talking about?", options: ["A bar", "A hotel", "A flat", "A restaurant"], correct: 2, audio: "audio6.mp3" },
        { q: "What is the speaker talking about?", options: ["A post-graduate course", "A job", "A business", "A degree"], correct: 1, audio: "audio7.mp3" },
        { q: "What is the speaker talking about?", options: ["A book", "A passport", "A wallet", "A suitcase"], correct: 2, audio: "audio8.mp3" },
        { q: "What is the speaker talking about?", options: ["A book", "A film", "A play", "A game"], correct: 0, audio: "audio9.mp3" },
        { q: "You are going to hear a news story about a missing boatman. Which is true?", options: ["Mr. Stewart ran out of fuel", "Mr. Stewart is in hospital", "Mr. Stewart was found by another fishing boat", "The weather conditions made it difficult to find him"], correct: 0, audio: "audio10.mp3" },
        { q: "You are going to hear a weather forecast. Which is true?", options: ["be perfect for going to the coast", "be lower than they usually are", "reach its maximum this year so far", "be much higher than in popular holiday resorts"], correct: 2, audio: "audio11.mp3" },
        { q: "You are going to hear a news item about English. Which is true?", options: ["English has received little influence from other languages", "The English language has incorporated a lot of foreign words", "English is an easy language for foreigners to learn", "Learning languages is especially difficult for English speakers"], correct: 1, audio: "audio12.mp3" },
        { q: "You are going to hear a news item about breakfast. Which is true? According to the news item, people who don't eat breakfast ...", options: ["are thinner than people who do", "don’t have a lot of free time", "are usually very active people", "can have problems with schoolwork"], correct: 3, audio: "audio13.mp3" },
        { q: "You are going to hear a news item about acupuncture. Which is true?", options: ["all patients were treated with acupuncture", "none of the patients could work", "the patients treated with acupuncture improved", "normal NHS treatment was as effective"], correct: 2, audio: "audio14.mp3" }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;
    let audioObj = new Audio();

    function renderQuestion() {
        answered = false;
        const q = questions[currentIdx];
        const container = document.getElementById('question-container');
        
        container.innerHTML = `
            <div class="audio-section">
                <button class="play-btn" id="p1" onclick="playOnce('p1')"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                <button class="play-btn" id="p2" onclick="playOnce('p2')"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
            </div>
            <div class="question-text">${q.q}</div>
            <div class="options-list">
                ${q.options.map((opt, i) => `
                    <div class="option-item">
                        <button class="option-button" onclick="handleChoice(${i}, this)">
                            <span>${opt}</span>
                            <span class="feedback-icon" id="icon-${i}"></span>
                        </button>
                    </div>
                `).join('')}
            </div>
        `;
        document.getElementById('next-button').style.display = 'none';
        document.getElementById('question-counter').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        updateProgress();
    }

    window.playOnce = function(btnId) {
        const btn = document.getElementById(btnId);
        if (btn.classList.contains('disabled')) return;
        
        audioObj.src = questions[currentIdx].audio;
        audioObj.play();
        btn.classList.add('disabled');
    };

    window.handleChoice = function(choiceIdx, btn) {
        if (answered) return;
        answered = true;
        
        const correctIdx = questions[currentIdx].correct;
        const buttons = document.querySelectorAll('.option-button');
        
        buttons.forEach((b, i) => {
            b.classList.add('disabled');
            const icon = b.querySelector('.feedback-icon');
            if (i === correctIdx) {
                b.classList.add('correct');
                icon.innerHTML = '✓';
            } else if (i === choiceIdx) {
                b.classList.add('incorrect');
                icon.innerHTML = '✕';
            }
        });

        if (choiceIdx === correctIdx) score++;
        
        const nextBtn = document.getElementById('next-button');
        nextBtn.style.display = 'block';
        nextBtn.innerText = currentIdx === questions.length - 1 ? "Finish Exercise" : "Next Question";
    };

    window.nextQuestion = function() {
        audioObj.pause();
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion();
        } else {
            showResults();
        }
    };

    function updateProgress() {
        const progress = (currentIdx / questions.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showResults() {
        document.getElementById('progress-bar').style.width = `100%`;
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('results-ui').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
    }

    window.onload = renderQuestion;
</script>

</body>
</html>
